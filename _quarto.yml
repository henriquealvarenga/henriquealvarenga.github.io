format:
  html:
    theme: [cosmo, custom.scss]
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
    grid:
      body-width: 900px
      sidebar-width: 250px
      margin-width: 250px
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    include-after-body:
      - text: |
          <script>
          // Fade-in on scroll
          document.addEventListener("DOMContentLoaded", () => {
            const io = new IntersectionObserver((entries) => {
              entries.forEach(e => {
                if (e.isIntersecting) {
                  e.target.classList.add("is-visible");
                  io.unobserve(e.target);
                }
              });
            }, { threshold: 0.12 });
            document.querySelectorAll("main h2, main .card, main .info-grid, main .gallery, main .map-wrap, main .pub-list, main .hero-banner, main figure").forEach(el => {
              el.classList.add("fade-in");
              io.observe(el);
            });
          });
          </script>

lang: pt-BR
