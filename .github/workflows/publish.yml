name: Render e Publica no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissões necessárias para que a Action consiga publicar no Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy rode por vez (cancela em fila intermediária,
# mas não interrompe um deploy em andamento)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Renderizar site Quarto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar o Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Renderizar site
        run: quarto render

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar artefato do site (pasta docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Publicar no GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
